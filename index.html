<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JR SITE LLC | Premium Construction & Asphalt | Puerto Rico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hero-bg {
            position: relative;
            min-height: 100vh;
            overflow: hidden;
        }
        .hero-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }
        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(15,23,42,0.78), rgba(15,23,42,0.88));
            z-index: 1;
        }
    </style>
</head>
<body class="bg-slate-950 text-white">
    <!-- NAVBAR -->
    <nav class="bg-slate-950 border-b border-slate-800 sticky top-0 z-50 p-5">
        <div class="max-w-screen-2xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-4">
                <img src="jrsite-logo.png" alt="JR SITE LLC" class="h-12">
                <div>
                    <h1 class="text-3xl font-bold">JR SITE</h1>
                    <p class="text-red-400 text-sm">LLC • PUERTO RICO</p>
                </div>
            </div>
            <a href="#contact" class="bg-red-600 text-white px-8 py-3 rounded-2xl font-semibold">GET FREE QUOTE</a>
        </div>
    </nav>

    <!-- HERO VIDEO TEST -->
    <header class="hero-bg min-h-screen flex items-center relative">
        <video class="hero-video" autoplay loop muted playsinline>
            <source src="hero-video-project3sanlorenzo.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        
        <div class="hero-overlay"></div>

        <div class="max-w-screen-2xl mx-auto px-8 relative z-10 text-center">
            <h1 class="text-6xl md:text-7xl font-bold text-white">TEST VIDEO BACKGROUND</h1>
            <p class="mt-6 text-xl text-white">If you see this text over the video, the background is working.</p>
        </div>
    </header>

    <script>
        console.log("Video background test loaded");
    </script>
</body>
</html>
