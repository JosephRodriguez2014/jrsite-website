<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JR SITE LLC Video Test</title>
    <style>
        body { margin:0; font-family: Arial, sans-serif; background:#0f172a; color:white; }
        .hero {
            position: relative;
            height: 100vh;
            overflow: hidden;
        }
        video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }
        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(15,23,42,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="hero">
        <video autoplay loop muted playsinline>
            <source src="hero-video-project3sanlorenzo.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div class="overlay">
            <div>
                <h1 style="font-size: 3rem; margin-bottom: 1rem;">VIDEO TEST</h1>
                <p>If you see this text but NO video playing behind it, the video is not loading.</p>
                <p style="margin-top: 2rem; font-size: 1.1rem;">Exact filename being used: hero-video-project3sanlorenzo.mp4</p>
            </div>
        </div>
    </div>
</body>
</html>
